<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cute Cat Clicker</title>

<style>
    * {
        box-sizing: border-box;
    }

    body {
        margin: 0;
        font-family: Arial, Helvetica, sans-serif;
        background: #ffb6d9;
        overflow-x: hidden;
        text-align: center;
    }

    h1 {
        color: white;
        margin-top: 30px;
        font-size: 3rem;
        text-shadow: 2px 2px 8px hotpink;
    }

    p {
        color: white;
        font-size: 1.2rem;
    }

    .cats {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 30px;
        padding: 40px;
    }

    .cat {
        width: 220px;
        border-radius: 20px;
        cursor: pointer;
        transition: transform .25s;
        box-shadow: 0 10px 25px rgba(0,0,0,.2);
    }

    .cat:hover {
        transform: scale(1.05);
    }

    .spin {
        animation: spin .8s linear;
    }

    @keyframes spin {
        from { transform: rotate(0deg) scale(1); }
        to   { transform: rotate(360deg) scale(1.15); }
    }
</style>
</head>
<body>

<h1>🐱 Cute Cat Zone 🐱</h1>
<p>Click the cats!</p>

<div class="cats">
    <img class="cat" src="https://cataas.com/cat?1" alt="Cat">
    <img class="cat" src="https://cataas.com/cat?2" alt="Cat">
    <img class="cat" src="https://cataas.com/cat?3" alt="Cat">
    <img class="cat" src="https://cataas.com/cat?4" alt="Cat">
</div>

<script>
function meow() {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();

    function tone(freq, duration, delay) {
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();

        osc.type = "triangle";
        osc.frequency.value = freq;

        osc.connect(gain);
        gain.connect(ctx.destination);

        const start = ctx.currentTime + delay;

        gain.gain.setValueAtTime(0.0001, start);
        gain.gain.exponentialRampToValueAtTime(0.25, start + 0.02);
        gain.gain.exponentialRampToValueAtTime(0.0001, start + duration);

        osc.start(start);
        osc.stop(start + duration);
    }

    // Tiny "meow"
    tone(700, 0.18, 0);
    tone(500, 0.25, 0.18);
}

document.querySelectorAll(".cat").forEach(cat => {
    cat.addEventListener("click", () => {
        cat.classList.remove("spin");
        void cat.offsetWidth; // restart animation
        cat.classList.add("spin");
        meow();
    });

    cat.addEventListener("animationend", () => {
        cat.classList.remove("spin");
    });
});
</script>

</body>
</html>
